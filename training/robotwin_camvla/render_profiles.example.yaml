schema_version: 1
description: >-
  Reference rendering profiles for RoboTwin multiview generation. These values
  document intended settings; wire them into the RoboTwin replay CLI before use.

profiles:
  archival_current:
    camera_shader_dir: rt
    ray_tracing_samples_per_pixel: 256
    ray_tracing_path_depth: 8
    ray_tracing_denoiser: optix
    third_person_resolution: [1280, 800]
    include_wrist_cameras: true
    sample_hz: 10
    video_codec: libx264
    video_preset: fast
    video_crf: 20

  balanced_training:
    camera_shader_dir: rt
    ray_tracing_samples_per_pixel: 32
    ray_tracing_path_depth: 4
    ray_tracing_denoiser: optix
    third_person_resolution: [640, 400]
    include_wrist_cameras: false
    sample_hz: 10
    video_codec: libx264
    video_preset: veryfast
    video_crf: 23
    notes:
      - Scale fx, fy, ppx, and ppy by 0.5 when reusing 1280x800 distortion calibration.
      - Keep every camera in one episode on the same rendering profile.

  geometry_fast:
    camera_shader_dir: default
    third_person_resolution: [640, 400]
    include_wrist_cameras: false
    sample_hz: 10
    video_codec: libx264
    video_preset: veryfast
    video_crf: 26
    notes:
      - Use for geometry and pipeline experiments, not visual-style parity claims.
